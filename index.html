<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LP Before/After ポートフォリオ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; background: #f5f5f5; color: #333; }
header { background: #1a1a2e; color: white; padding: 40px 20px; text-align: center; }
header h1 { font-size: 2rem; margin-bottom: 8px; }
header p { opacity: 0.8; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
.card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: transform 0.2s; }
.card:hover { transform: translateY(-4px); }
.card-body { padding: 20px; }
.card-body h2 { font-size: 1.2rem; margin-bottom: 8px; }
.card-body p { font-size: 0.9rem; color: #666; margin-bottom: 16px; }
.links { display: flex; gap: 12px; }
.links a { padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 0.85rem; font-weight: bold; }
.before-link { background: #e0e0e0; color: #333; }
.after-link { background: #1a1a2e; color: white; }
</style>
</head>
<body>
<header>
<h1>LP Before / After ポートフォリオ</h1>
<p>AI臭さ排除ガイドライン適用前後の比較事例集</p>
</header>
<div class="grid" id="cases">
<!-- Cases will be added here -->
</div>
</body>
</html>
